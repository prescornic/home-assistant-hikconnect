create_area:
  name: Create area
  description: Create a new NVR area (group).
  fields:
    device_serial:
      name: Device Serial
      description: The serial number of the NVR/device.
      example: "FK12345678"
      required: true
      selector:
        text:
    group_name:
      name: Group Name
      description: Human-readable name for the new area.
      example: "Gate"
      required: true
      selector:
        text:
    resource_ids:
      name: Resource IDs
      description: List of camera id strings to include in the area.
      example: ["aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"]
      required: true
      selector:
        object:

delete_area:
  name: Delete area
  description: Delete an existing NVR area (group).
  fields:
    device_serial:
      name: Device Serial
      description: The serial number of the NVR/device.
      example: "FK12345678"
      required: true
      selector:
        text:
    group_id:
      name: Group ID
      description: Numeric ID of the area.
      example: 12345678
      required: true
      selector:
        number:
          mode: box

update_area:
  name: Update area
  description: Update an existing NVR area's cameras. This deletes and recreates the area with the new cameras, resulting in a new group ID.
  fields:
    device_serial:
      name: Device Serial
      description: The serial number of the NVR/device.
      example: "FK12345678"
      required: true
      selector:
        text:
    group_id:
      name: Group ID
      description: Numeric ID of the area.
      example: 12345678
      required: true
      selector:
        number:
          mode: box
    group_name:
      name: Group Name
      description: Area name (keep the same name or rename).
      example: "Gate"
      required: true
      selector:
        text:
    resource_ids:
      name: Resource IDs
      description: Complete list of camera id strings to include in the area.
      example: ["aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa", "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"]
      required: true
      selector:
        object:
